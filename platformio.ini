; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; 🔌 COM PORT NOTES:
;   Most students can IGNORE this file — PlatformIO auto-detects
;   the board when you use the VS Code upload button.
;   Only uncomment `monitor_port` below if the auto-detect fails,
;   or if you're using the command line (see README for instructions).

[env:seeed_xiao_esp32c3]
; 使用 Espressif 32 平台，也就是 ESP32/ESP32-C3 这一类芯片的 PlatformIO 支持包。
platform = espressif32
; 目标开发板是 Seeed Studio XIAO ESP32C3，决定引脚、Flash、上传方式等默认配置。
board = seeed_xiao_esp32c3
; 使用 Arduino 风格的 setup()/loop() 开发框架。
framework = arduino
; XIAO ESP32-C3 常用 dout Flash 模式，提升兼容性。
board_build.flash_mode = dout
; 明确 MCU 型号是 esp32c3。
board_build.mcu = esp32c3
; CPU 主频设为 160 MHz。
board_build.f_cpu = 160000000L
; 上传前先尝试通知固件释放马达控制脚，降低切入 bootloader 时误转风险。
extra_scripts = pre:tools/pre_upload_safety.py
build_flags =
  ; Fix USB CDC serial on ESP32-C3 — ensures USB serial is available
  ; 开机启用 USB CDC 串口，这样 Serial Monitor 能通过 USB 看到日志。
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; 选择 USB 工作模式。
  -DARDUINO_USB_MODE=1
  ; 指定 Arduino 主循环运行核心；ESP32-C3 是单核芯片，这里保持兼容配置。
  -DARDUINO_RUNNING_CORE=1
lib_deps =
  ; WebSockets 库负责浏览器和 ESP32 之间的实时双向通信。
  links2004/WebSockets
  ; ArduinoJson 负责解析网页发来的 JSON 命令。
  bblanchon/ArduinoJson
; 串口监视器波特率，必须和 Serial.begin(115200) 一致。
monitor_speed = 115200
; monitor_port = COM9   ; ← Uncomment AND change COM9 to your port if needed
